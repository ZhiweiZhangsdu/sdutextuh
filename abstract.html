<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <meta name="description" content="Abstract - SDU Combinatorics Group" />
    <meta name="author" content="SDU Combinatorics Group" />
    <title>Abstract | SDU Combinatorics Group</title>

    <!-- Icon -->
    <link rel="icon" type="image/x-icon" href="static/assets/favicon.ico" />

    <!-- Bootstrap Icons (CDN) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- System fonts -->
    <style>
        :root {
            --bs-font-sans-serif: -apple-system, BlinkMacSystemFont, "Segoe UI",
                "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
                Arial, sans-serif;

--theme-blue-dark: #1e3c72;
--theme-blue: #2a5298;
--theme-blue-soft: #eef4ff;
--theme-blue-muted: #6c757d;
        }
    </style>

    <!-- CSS -->
    <link rel="stylesheet" href="static/css/styles.css" />
    <link rel="stylesheet" href="static/css/main.css" />

    <!-- JS (LOCAL) -->
    <script src="static/js/bootstrap.bundle.min.js"></script>
    <script src="static/js/marked.min.js"></script>
    <script src="static/js/js-yaml.min.js"></script>

    <!-- MathJax: only ONE renderer -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            svg: {
                fontCache: 'local'
            },
            startup: {
                typeset: true
            }
        };
    </script>
    <script defer id="MathJax-script"
        src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

    <!-- Screenshot library -->
    <script src="https://cdn.jsdelivr.net/npm/dom-to-image-more@3.7.2/dist/dom-to-image-more.min.js"></script>

    <!-- Core JS -->
    <script src="static/js/scripts.js"></script>

    <style>
        .abstract-card {
            background: #ffffff;
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            padding: 2rem;
            margin-bottom: 2rem;
            position: relative;
            border-top: 4px solid var(--theme-blue);
            color: #2b2b2b;
        }

        .abstract-card .name {
            font-size: 2rem;
            font-weight: 700;
            color: var(--theme-blue-dark);
            line-height: 1.25;
            padding-right: 26%;
        }

        .abstract-card .title {
            font-size: 1.5rem;
            font-style: italic;
            color: var(--theme-blue);
            margin-top: 0.5rem;
            line-height: 1.4;
            padding-right: 26%;
        }

        .abstract-card .date {
            color: var(--theme-blue-muted);
            margin-bottom: 1.5rem;
            margin-top: 0.75rem;
        }

        .abstract-card .abstract-label {
            font-weight: 700;
            color: var(--theme-blue-dark);
            border-bottom: 2px solid var(--theme-blue);
            display: inline-block;
            margin-bottom: 1rem;
            padding-bottom: 0.15rem;
        }

        .abstract-card .abstract-content,
        .abstract-card .bio-content {
            line-height: 1.8;
            word-break: break-word;
        }

        .btn-outline-primary {
            border-color: var(--theme-blue);
            color: var(--theme-blue);
        }

        .btn-outline-primary:hover {
            background-color: var(--theme-blue);
            border-color: var(--theme-blue);
            color: #fff;
        }

        .card-logo {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 30%;
            max-width: 800px;
            height: auto;
        }

        .zoom-info {
            border-left: 4px solid var(--theme-blue);
            background-color: var(--theme-blue-soft);
            font-size: 0.95rem;
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 0.5rem;
        }

        .zoom-info i {
            color: var(--theme-blue);
            margin-right: 0.3rem;
        }

        /* MathJax stability inside screenshot card */
        #abstract-card mjx-container {
            margin: 0;
        }

        #abstract-card mjx-container[jax="SVG"] {
            overflow: visible !important;
        }

        #abstract-card mjx-container[jax="SVG"]>svg {
            vertical-align: middle !important;
        }

        #abstract-card .MathJax_Display,
        #abstract-card mjx-container[display="true"] {
            margin: 1rem 0 !important;
        }

        @media (max-width: 768px) {
            .abstract-card {
                padding: 1.5rem;
            }

            .abstract-card .name,
            .abstract-card .title {
                padding-right: 0;
            }

            .card-logo {
                position: static;
                display: block;
                width: 120px;
                max-width: 40%;
                margin: 0 0 1rem auto;
            }
        }
    </style>
</head>

<body>
    <!-- Navigation -->
    <nav class="header navbar navbar-expand-lg navbar-light fixed-top shadow-sm" id="mainNav">
        <div class="container px-5">
            <a class="navbar-brand fw-bold" href="index.html">SDU Comb Group</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive"
                aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
                MENU <i class="bi bi-list"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarResponsive">
                <ul class="navbar-nav ms-auto me-4 my-3 my-lg-0">
                    <li class="nav-item"><a class="nav-link me-lg-3" href="index.html">HOME</a></li>
                    <li class="nav-item"><a class="nav-link me-lg-3 active" href="seminars.html">SEMINARS</a></li>
                    <li class="nav-item"><a class="nav-link me-lg-3" href="workshops.html">WORKSHOPS</a></li>
                    <li class="nav-item"><a class="nav-link me-lg-3" href="conferences.html">CONFERENCES</a></li>
                    <li class="nav-item"><a class="nav-link me-lg-3" href="members.html">MEMBERS</a></li>
                    <li class="nav-item"><a class="nav-link me-lg-3" href="news.html">NEWS</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Top Section -->
    <section class="top-section" style="background-image: url('static/assets/img/background.jpeg');">
        <div class="top-section-content">
            <div class="container px-5">
                <h2 class="text-white display-3 lh-1 font-alt">&nbsp;</h2>
            </div>
        </div>
    </section>

    <!-- Abstract Content -->
    <section class="bg-gradient-primary-to-secondary-gray py-5" id="abstract">
        <div class="container px-5">
            <div class="mb-4">
                <a href="seminars.html" class="btn btn-outline-secondary ms-2">
                    All seminars
                </a>
            </div>

            <div id="abstract-container">
                <div class="text-center py-5" id="loading-spinner">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">加载中...(Loading...)</span>
                    </div>
                </div>
            </div>

            <div class="d-flex gap-3 justify-content-center mt-4" id="action-buttons" style="display: none;">
                <button class="btn btn-outline-primary btn-lg" id="copy-screenshot-btn">
                     分享(Share)
                </button>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-bottom text-center py-5">
        <div class="container px-5">
            <div class="text-white-50 small">
                <div id="copyright-text" class="mb-2"></div>
            </div>
        </div>
    </footer>

    <script>
        (async function () {
            function escapeHtml(unsafe) {
                if (unsafe === null || unsafe === undefined) return '';
                return String(unsafe)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;");
            }

            function safeHtml(value, fallback = '') {
                return value === null || value === undefined || value === '' ? fallback : value;
            }

            async function waitForImages(root) {
                const images = Array.from(root.querySelectorAll('img'));
                await Promise.all(images.map(img => {
                    if (img.complete && img.naturalWidth > 0) return Promise.resolve();
                    return new Promise(resolve => {
                        img.addEventListener('load', resolve, { once: true });
                        img.addEventListener('error', resolve, { once: true });
                    });
                }));
            }

            async function waitForMathReady(node) {
                if (window.MathJax && window.MathJax.startup && window.MathJax.startup.promise) {
                    await window.MathJax.startup.promise;
                }

                if (window.MathJax && window.MathJax.typesetPromise) {
                    await window.MathJax.typesetPromise([node]);
                }

                if (document.fonts && document.fonts.ready) {
                    await document.fonts.ready;
                }

                await waitForImages(node);

                await new Promise(resolve =>
                    requestAnimationFrame(() =>
                        requestAnimationFrame(resolve)
                    )
                );
            }

            async function copyImageBlobToClipboard(blob) {
                if (!window.ClipboardItem || !navigator.clipboard || !navigator.clipboard.write) {
                    throw new Error('Clipboard image write is not supported.');
                }

                await navigator.clipboard.write([
                    new ClipboardItem({ [blob.type]: blob })
                ]);
            }

            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            const container = document.getElementById('abstract-container');
            const loadingSpinner = document.getElementById('loading-spinner');
            const actionButtonsDiv = document.getElementById('action-buttons');
            const copyScreenshotBtn = document.getElementById('copy-screenshot-btn');

            if (!id) {
                if (loadingSpinner) loadingSpinner.style.display = 'none';
                container.innerHTML = `
                    <div class="alert alert-warning text-center py-5" role="alert">
                        <i class="bi bi-exclamation-triangle" style="font-size: 3rem;"></i>
                        <h3 class="mt-3">缺少ID参数</h3>
                        <p>请在URL中指定 ?id=xxx</p>
                        <a href="seminars.html" class="btn btn-primary mt-3">返回研讨会列表</a>
                    </div>
                `;
                return;
            }

            try {
                const response = await fetch('static/data/abstracts.json', { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status} - 无法加载数据文件`);
                }

                const abstractsData = await response.json();
                const data = abstractsData[id];

                if (!data) {
                    throw new Error(`ID "${id}" 不存在`);
                }

                const zoomMeetingId = "<a href="https://syddanskuni.zoom.us/j/63278688120?pwd=yMJb3DVFAt3oT5zHuQfw8Uau0CZPrb.1" target="_blank" rel="noopener">632 7868 8120</a>";
                const zoomPasscode = "SDUCOMB";

                const cardHtml = `
                    <div id="abstract-card" class="abstract-card">
                        <img src="static/assets/img/SDU-logo.png" alt="Logo" class="card-logo">

                        <div class="name">${safeHtml(data.name, '未知')}</div>
                        <div class="title">${safeHtml(data.title, '无标题')}</div>
                        <div class="date"> ${escapeHtml(data.date || '')}</div>

                        <div class="abstract-label">Abstract</div>
                        <div class="abstract-content fs-5 mb-4">${safeHtml(data.abstract, '')}</div>

                        ${data.bio ? `<div class="abstract-label">Introduction</div><div class="bio-content">${data.bio}</div>` : ''}

                        <div class="zoom-info">
                            <strong>Zoom Meeting:</strong>  &nbsp;&nbsp;&nbsp;&nbsp;  Meeting ID: ${zoomMeetingId}            &nbsp;&nbsp;&nbsp;&nbsp;                Passcode: ${zoomPasscode}
                        </div>
                    </div>
                `;

                if (loadingSpinner) loadingSpinner.style.display = 'none';
                container.innerHTML = cardHtml;
                actionButtonsDiv.style.setProperty('display', 'flex');

                const cardElement = document.getElementById('abstract-card');
                await waitForMathReady(cardElement);

                copyScreenshotBtn.addEventListener('click', async function () {
                    const button = this;
                    const card = document.getElementById('abstract-card');
                    if (!card) return;

                    const originalText = button.innerHTML;
                    button.disabled = true;
                    button.innerHTML = `<i class="bi bi-hourglass-split"></i> 生成中...`;

                    try {
                        await waitForMathReady(card);

                        const dataUrl = await domtoimage.toPng(card, {
                            bgcolor: '#ffffff',
                            cacheBust: true,
                            quality: 1,
                            style: {
                                transform: 'none',
                                margin: '0'
                            }
                        });

                        const blob = await fetch(dataUrl).then(res => res.blob());

                        try {
                            await copyImageBlobToClipboard(blob);
                            alert('✅ 截图已复制到剪贴板');
                        } catch (clipboardError) {
                            const newWindow = window.open();
                            if (newWindow) {
                                newWindow.document.write(`
                                    <!DOCTYPE html>
                                    <html lang="en">
                                    <head>
                                        <meta charset="utf-8">
                                        <title>Abstract Image</title>
                                        <style>
                                            body {
                                                margin: 0;
                                                padding: 1rem;
                                                background: #f5f5f5;
                                                text-align: center;
                                            }
                                            img {
                                                max-width: 100%;
                                                height: auto;
                                                box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15);
                                                border-radius: 0.75rem;
                                                background: white;
                                            }
                                        </style>
                                    </head>
                                    <body>
                                        <img src="${dataUrl}" alt="Abstract Screenshot">
                                    </body>
                                    </html>
                                `);
                                newWindow.document.close();
                            } else {
                                alert('截图已生成，但浏览器阻止了新窗口打开。');
                            }
                        }
                    } catch (error) {
                        console.error('截图生成失败:', error);
                        alert('截图生成失败，请查看控制台报错信息。');
                    } finally {
                        button.disabled = false;
                        button.innerHTML = originalText;
                    }
                });

            } catch (error) {
                if (loadingSpinner) loadingSpinner.style.display = 'none';
                container.innerHTML = `
                    <div class="alert alert-danger text-center py-5" role="alert">
                        <i class="bi bi-exclamation-triangle" style="font-size: 3rem;"></i>
                        <h3 class="mt-3">加载失败</h3>
                        <p>${escapeHtml(error.message)}</p>
                        <a href="seminars.html" class="btn btn-primary mt-3">返回研讨会列表</a>
                    </div>
                `;
            }

            const copyrightEl = document.getElementById('copyright-text');
            if (copyrightEl) {
                const year = new Date().getFullYear();
                copyrightEl.innerHTML = `© ${year} SDU Combinatorics Group. All rights reserved.`;
            }
        })();
    </script>
</body>

</html>
