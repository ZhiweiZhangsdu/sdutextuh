<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <meta name="description" content="Abstract - SDU Combinatorics Group" />
    <meta name="author" content="SDU Combinatorics Group" />
    <title>Abstract | SDU Combinatorics Group</title>

    <!-- Icon -->
    <link rel="icon" type="image/x-icon" href="static/assets/favicon.ico" />

    <!-- Bootstrap Icons (CDN) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- System fonts (No Google Fonts) -->
    <style>
        :root {
            --bs-font-sans-serif: -apple-system, BlinkMacSystemFont, "Segoe UI",
                "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
                Arial, sans-serif;
        }
    </style>

    <!-- CSS -->
    <link rel="stylesheet" href="static/css/styles.css" />
    <link rel="stylesheet" href="static/css/main.css" />

    <!-- JS (LOCAL) -->
    <script src="static/js/bootstrap.bundle.min.js"></script>
    <script src="static/js/marked.min.js"></script>
    <script src="static/js/js-yaml.min.js"></script>

    <!-- MathJax (CDN) -->
<script>
    MathJax = {
        tex: {
            inlineMath: [['$', '$'], ['\\(', '\\)']],
            displayMath: [['$$', '$$'], ['\\[', '\\]']]
        },
        svg: {
            fontCache: 'global'
        }
    };
</script>
<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- html2canvas (CDN) for screenshot copy -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- Core JS (版权等) -->
    <script src="static/js/scripts.js"></script>

    <style>
        /* 原有样式 */
        .abstract-card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            padding: 2rem;
            margin-bottom: 2rem;
            position: relative; /* 为 logo 定位 */
        }
        .abstract-card .name {
            font-size: 2rem;
            font-weight: 600;
            color: #1e3c72;
        }
        .abstract-card .title {
            font-size: 1.5rem;
            font-style: italic;
            color: #2a5298;
            margin-top: 0.5rem;
        }
        .abstract-card .date {
            color: #6c757d;
            margin-bottom: 1.5rem;
        }
        .abstract-card .abstract-label {
            font-weight: 600;
            color: #1e3c72;
            border-bottom: 2px solid #2a5298;
            display: inline-block;
            margin-bottom: 1rem;
        }
        .btn-outline-primary {
            border-color: #2a5298;
            color: #2a5298;
        }
        .btn-outline-primary:hover {
            background-color: #2a5298;
            color: white;
        }

        /* 新增样式：右上角 Logo */
        .card-logo {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 25%;
            height: auto;
        }

        /* 新增样式：Zoom 信息框 */
        .zoom-info {
            border-left: 4px solid #2a5298;
            background-color: #f8f9fa;
            font-size: 0.95rem;
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 0.5rem;
        }
        .zoom-info i {
            color: #2a5298;
            margin-right: 0.3rem;
        }
    </style>
</head>

<body>
    <!-- Navigation -->
    <nav class="header navbar navbar-expand-lg navbar-light fixed-top shadow-sm" id="mainNav">
        <div class="container px-5">
            <a class="navbar-brand fw-bold" href="index.html">SDU Comb Group</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive"
                    aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
                MENU <i class="bi bi-list"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarResponsive">
                <ul class="navbar-nav ms-auto me-4 my-3 my-lg-0">
                    <li class="nav-item"><a class="nav-link me-lg-arnav-link me-lg-3" href="index.html">HOME</a></li>
                    <li class="nav-item"><a class="nav-link me-lg-3 active" href="seminars.html">SEMINARS</a></li>
                    <li class="nav-item"><a class="nav-link me-lg-3" href="workshops.html">WORKSHOPS</a></li>
                     <li class="nav-item"><a class="nav-link me-lg-3" href="conferences.html">CONFERENCES</a></li>
                    <li class="nav-item"><a class="nav-link me-lg-3" href="members.html">MEMBERS</a></li>
                    <li class="nav-item"><a class="nav-link me-lg-3" href="news.html">NEWS</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Top Section -->
    <section class="top-section" style="background-image: url('static/assets/img/background.jpeg');">
        <div class="top-section-content">
            <div class="container px-5">
                <h2 class="text-white display-3 lh-1 font-alt">&nbsp;</h2>
            </div>
        </div>
    </section>

    <!-- Abstract Content -->
    <section class="bg-gradient-primary-to-secondary-gray py-5" id="abstract">
        <div class="container px-5">
            <!-- 返回按钮 -->
            <div class="mb-4">
                <a href="seminars.html" class="btn btn-outline-secondary ms-2">
                    All seminars
                </a>
            </div>

            <!-- 卡片容器（动态填充） -->
            <div id="abstract-container">
                <div class="text-center py-5" id="loading-spinner">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">加载中...(Loading...)</span>
                    </div>
                </div>
            </div>

            <!-- 操作按钮 -->
            <div class="d-flex gap-3 justify-content-center mt-4" id="action-buttons" style="display: none !important;">
                 <button class="btn btn-outline-primary btn-lg" id="copy-screenshot-btn">
                    <i class="bi bi-share"></i> 分享(Share)
                </button>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-bottom text-center py-5">
        <div class="container px-5">
            <div class="text-white-50 small">
                <div id="copyright-text" class="mb-2"></div>
            </div>
        </div>
    </footer>

    <script>
    (async function() {
        // 工具函数：转义 HTML
        function escapeHtml(unsafe) {
            if (!unsafe) return unsafe;
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // 获取 URL 参数 id
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');

        const container = document.getElementById('abstract-container');
        const loadingSpinner = document.getElementById('loading-spinner');
        const actionButtonsDiv = document.getElementById('action-buttons');
        const copyScreenshotBtn = document.getElementById('copy-screenshot-btn');

        if (!id) {
            if (loadingSpinner) loadingSpinner.style.display = 'none';
            container.innerHTML = `
                <div class="alert alert-warning text-center py-5" role="alert">
                    <i class="bi bi-exclamation-triangle" style="font-size: 3rem;"></i>
                    <h3 class="mt-3">缺少ID参数</h3>
                    <p>请在URL中指定 ?id=xxx</p>
                    <a href="seminars.html" class="btn btn-primary mt-3">返回研讨会列表</a>
                </div>
            `;
            return;
        }

        try {
            const response = await fetch('static/data/abstracts.json');
            if (!response.ok) {
                throw new Error(`HTTP ${response.status} - 无法加载数据文件`);
            }
            const abstractsData = await response.json();

            const data = abstractsData[id];
            if (!data) {
                throw new Error(`ID "${id}" 不存在`);
            }

            // ========== 静态 Zoom 信息 ==========
            // 你可以在这里修改 Zoom 号和密码，所有摘要共用
            const zoomMeetingId = "632 7868 8120";
            const zoomPasscode = "SDUCOMB";

            // 构建卡片 HTML（包含静态 Zoom）
            const cardHtml = `
                <div id="abstract-card" class="abstract-card">
                    <!-- 右上角 Logo（请确保图片存在，或替换为正确路径） -->
                    <img src="static/assets/img/SDU-logo.png" alt="Logo" class="card-logo">
                    
                    <div class="name">${escapeHtml(data.name) || '未知'}</div>
                    <div class="title">${escapeHtml(data.title) || '无标题'}</div>
                    <div class="date"><i class="bi bi-calendar-event"></i> ${escapeHtml(data.date) || ''}</div>
                    
                    <div class="abstract-label">Abstract</div>
                    <div class="abstract-content fs-5 mb-4">${data.abstract || ''}</div>
                    
                    ${data.bio ? `<div class="abstract-label">Introduction</div><div class="bio-content">${data.bio}</div>` : ''}
                    
                    <!-- 静态 Zoom 信息（所有摘要相同） -->
                    <div class="zoom-info">
                         <strong>Zoom Meeting:</strong><br>
                        Meeting ID: ${zoomMeetingId}<br>
                        Passcode: ${zoomPasscode}
                    </div>
                </div>
            `;

            loadingSpinner.style.display = 'none';
            container.innerHTML = cardHtml;
            actionButtonsDiv.style.display = 'flex';

            // 触发 MathJax 渲染
            if (window.MathJax) {
                await MathJax.typesetPromise([container]).catch(console.error);
            }

            // 复制截图功能
           copyScreenshotBtn.addEventListener('click', async function() {
    const cardElement = document.getElementById('abstract-card');
    if (!cardElement) return;

    // 1. 等待原始文档中的 MathJax 渲染完成
    if (window.MathJax) {
        await MathJax.typesetPromise([cardElement]).catch(console.error);
    }

    // 2. 使用 html2canvas 截图
    html2canvas(cardElement, {
        scale: 2,
        backgroundColor: '#ffffff',
        allowTaint: false,
        useCORS: true,
        logging: true,          // 开启日志便于调试（可选）
        onclone: async (clonedDoc, element) => {
            // 在克隆文档中也触发 MathJax 渲染，避免重影
            if (clonedDoc.MathJax) {
                await clonedDoc.MathJax.typesetPromise([element]).catch(console.error);
            }
        }
    }).then(canvas => {
        canvas.toBlob(async (blob) => {
            try {
                // 尝试写入剪贴板
                await navigator.clipboard.write([
                    new ClipboardItem({ [blob.type]: blob })
                ]);
                alert('✅ 截图已复制到剪贴板');
            } catch (err) {
                console.error('剪贴板写入失败:', err);
                // 降级：在新窗口显示图片，让用户手动保存
                const imgUrl = canvas.toDataURL('image/png');
                const newWindow = window.open();
                if (newWindow) {
                    newWindow.document.write(`
                        <html>
                            <head><title>截图预览</title></head>
                            <body style="margin:0; display:flex; justify-content:center; align-items:center; background:#f0f0f0;">
                                <img src="${imgUrl}" style="max-width:100%; max-height:100vh; box-shadow:0 0 10px rgba(0,0,0,0.3);">
                                <p style="position:fixed; bottom:10px; left:0; width:100%; text-align:center; background:rgba(255,255,255,0.8); padding:5px;">
                                    右键图片选择“另存为”保存截图（自动复制失败）
                                </p>
                            </body>
                        </html>
                    `);
                    newWindow.document.close();
                } else {
                    alert('❌ 无法打开新窗口，请使用系统截图工具 (Command+Shift+4)');
                }
            }
        }, 'image/png');
    }).catch(error => {
        console.error('截图生成失败:', error);
        alert('❌ 截图生成失败：' + error.message);
    });
});

        } catch (error) {
            loadingSpinner.style.display = 'none';
            container.innerHTML = `
                <div class="alert alert-danger text-center py-5" role="alert">
                    <i class="bi bi-exclamation-triangle" style="font-size: 3rem;"></i>
                    <h3 class="mt-3">加载失败</h3>
                    <p>${escapeHtml(error.message)}</p>
                    <a href="seminars.html" class="btn btn-primary mt-3">返回研讨会列表</a>
                </div>
            `;
        }

        // 设置版权年份
        const copyrightEl = document.getElementById('copyright-text');
        if (copyrightEl) {
            const year = new Date().getFullYear();
            copyrightEl.innerHTML = `© ${year} SDU Combinatorics Group. All rights reserved.`;
        }
    })();
    </script>
</body>

</html>
